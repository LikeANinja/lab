---
- name: Ensure Seafile directories exist
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /srv/seafile
    - /srv/seafile/db
    - /srv/seafile/data
  become: true

- name: Ensure Seafile network exists
  command: "{{ podman_bin | default('/usr/bin/podman') }} network exists seafile-net"
  register: seafile_net_exists
  failed_when: false
  changed_when: false
  become: true

- name: Create Seafile network
  command: "{{ podman_bin | default('/usr/bin/podman') }} network create seafile-net"
  when: seafile_net_exists.rc != 0
  become: true

- name: Remove old Seafile containers if present
  command: "{{ podman_bin | default('/usr/bin/podman') }} rm -f {{ item }}"
  loop:
    - seafile
    - seafile-db
    - seafile-memcached
  failed_when: false
  changed_when: false
  become: true

- name: Pull Seafile images
  command: "{{ podman_bin | default('/usr/bin/podman') }} pull {{ item }}"
  loop:
    - docker.io/library/mariadb:10.11
    - docker.io/library/memcached:1.6-alpine
    - docker.io/seafileltd/seafile-mc:13.0.20
  changed_when: false
  become: true

- name: Run Seafile MariaDB
  command: >
    {{ podman_bin | default('/usr/bin/podman') }} run -d
    --name seafile-db
    --network seafile-net
    --network-alias db
    --restart=always
    -e MYSQL_ROOT_PASSWORD={{ seafile_db_root_password }}
    -e MYSQL_LOG_CONSOLE=true
    -v /srv/seafile/db:/var/lib/mysql
    docker.io/library/mariadb:10.11
  become: true

- name: Wait for Seafile MariaDB to be ready
  command: >
    {{ podman_bin | default('/usr/bin/podman') }} exec seafile-db
    mariadb-admin ping -h 127.0.0.1 -uroot -p{{ seafile_db_root_password }}
  register: seafile_db_ping
  retries: 30
  delay: 5
  until: seafile_db_ping.rc == 0
  changed_when: false
  become: true

- name: Run Seafile Memcached
  command: >
    {{ podman_bin | default('/usr/bin/podman') }} run -d
    --name seafile-memcached
    --network seafile-net
    --network-alias memcached
    --restart=always
    docker.io/library/memcached:1.6-alpine
  become: true

- name: Run Seafile
  command: >
    {{ podman_bin | default('/usr/bin/podman') }} run -d
    --name seafile
    --network seafile-net
    --restart=always
    -p {{ ports.seafile }}:80
    -e DB_HOST=db
    -e DB_PORT=3306
    -e DB_ROOT_PASSWD={{ seafile_db_root_password }}
    -e TIME_ZONE={{ timezone }}
    -e SEAFILE_ADMIN_EMAIL={{ seafile_admin_email }}
    -e SEAFILE_ADMIN_PASSWORD={{ seafile_admin_password }}
    -e SEAFILE_SERVER_LETSENCRYPT=false
    -e SEAFILE_SERVER_HOSTNAME={{ seafile_server_hostname }}
    -v /srv/seafile/data:/shared
    docker.io/seafileltd/seafile-mc:13.0.20
  become: true
