- name: Pre-pull mealie image (optional)
  when: prepull_images | default(false)
  command: "{{ podman_bin | default('/usr/bin/podman') }} pull ghcr.io/mealie-recipes/mealie:v3.12.0"
  changed_when: false
  become: true

- name: Check if mealie container exists
  command: "{{ podman_bin | default('/usr/bin/podman') }} container exists mealie"
  register: mealie_exists
  failed_when: false
  changed_when: false
  become: true

- name: Create mealie container
  command: >
    {{ podman_bin | default('/usr/bin/podman') }} run -d
    --name mealie
    --restart=always
    -p {{ ports.mealie }}:9000
    -e TZ={{ timezone }}
    -e ALLOW_SIGNUP=false
    -e PUID={{ mealie_puid | default('1000') }}
    -e PGID={{ mealie_pgid | default('1000') }}
    -e BASE_URL={{ mealie_base_url }}
    -e MAX_WORKERS=1
    -e WEB_CONCURRENCY=1
    -v /srv/mealie/data:/app/data
    ghcr.io/mealie-recipes/mealie:v3.12.0
  when: mealie_exists.rc != 0
  become: true
