---
- name: Ensure systemd unit directory exists
  file:
    path: /etc/systemd/system
    state: directory
    mode: "0755"

# -------------------------
# PODS
# -------------------------

- name: List existing pods
  command: podman pod ls --format "{{'{{'}}.Name{{'}}'}}"
  register: existing_pods
  changed_when: false
  failed_when: false

- name: Generate systemd units for existing pods
  command: podman generate systemd --new --name {{ item }} --files
  args:
    chdir: /etc/systemd/system
    creates: "/etc/systemd/system/pod-{{ item }}.service"
  loop: "{{ pod_names | default([]) }}"
  when: item in (existing_pods.stdout_lines | default([]))

# -------------------------
# STANDALONE CONTAINERS
# -------------------------

- name: List existing containers
  command: podman ps -a --format "{{'{{'}}.Names{{'}}'}}"
  register: existing_containers
  changed_when: false
  failed_when: false

- name: Generate systemd units for standalone containers
  command: podman generate systemd --new --name {{ item }} --files
  args:
    chdir: /etc/systemd/system
    creates: "/etc/systemd/system/container-{{ item }}.service"
  loop: "{{ container_names | default([]) }}"
  when: item in (existing_containers.stdout_lines | default([]))

# -------------------------
# SYSTEMD RELOAD
# -------------------------

- name: Reload systemd
  systemd:
    daemon_reload: true

# -------------------------
# ENABLE POD UNITS
# -------------------------

- name: Enable and start pod units
  systemd:
    name: "pod-{{ item }}.service"
    enabled: true
    state: started
  loop: "{{ pod_names | default([]) }}"
  when: item in (existing_pods.stdout_lines | default([]))

# -------------------------
# ENABLE CONTAINER UNITS
# -------------------------

- name: Enable and start standalone container units
  systemd:
    name: "container-{{ item }}.service"
    enabled: true
    state: started
  loop: "{{ container_names | default([]) }}"
  when: item in (existing_containers.stdout_lines | default([]))
