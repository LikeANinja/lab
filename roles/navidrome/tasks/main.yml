- name: Pre-pull navidrome image (optional)
  when: prepull_images | default(false)
  command: "{{ podman_bin | default('/usr/bin/podman') }} pull docker.io/deluan/navidrome:latest"
  register: navidrome_pull
  changed_when: "'Downloaded' in (navidrome_pull.stdout | default('')) or 'downloaded' in (navidrome_pull.stdout | default(''))"
  become: true

- name: Check if navidrome pod exists
  command: "{{ podman_bin | default('/usr/bin/podman') }} pod exists navidrome-pod"
  register: navidrome_pod_exists
  failed_when: false
  changed_when: false
  become: true

- name: Create navidrome pod
  command: >
    {{ podman_bin | default('/usr/bin/podman') }} pod create
    --name navidrome-pod
    -p {{ ports.navidrome }}:4533/tcp
  when: navidrome_pod_exists.rc != 0
  become: true

- name: Check if navidrome container exists
  command: "{{ podman_bin | default('/usr/bin/podman') }} container exists navidrome"
  register: navidrome_container_exists
  failed_when: false
  changed_when: false
  become: true

- name: Create navidrome container
  command: >
    {{ podman_bin | default('/usr/bin/podman') }} run -d
    --name navidrome
    --pod navidrome-pod
    --restart=always
    -e TZ={{ timezone }}
    -e ND_MUSICFOLDER=/music
    -e ND_DATAFOLDER=/data
    -v {{ srv_base }}/navidrome/data:/data
    -v {{ media_dir }}/music:/music:ro
    docker.io/deluan/navidrome:latest
  when: navidrome_container_exists.rc != 0
  become: true
