- name: Pre-pull calibre image (optional)
  when: prepull_images | default(false)
  command: "{{ podman_bin | default('/usr/bin/podman') }} pull docker.io/crocodilestick/calibre-web-automated:latest"
  changed_when: false
  become: true

- name: Check if calibre-web-automated container exists
  command: "{{ podman_bin | default('/usr/bin/podman') }} container exists calibre-web-automated"
  register: calibre_exists
  failed_when: false
  changed_when: false
  become: true

- name: Create calibre-web-automated container
  command: >
    {{ podman_bin | default('/usr/bin/podman') }} run -d
    --name calibre-web-automated
    --restart=always
    -p {{ ports.calibre }}:8083
    -e TZ={{ timezone }}
    -e PUID={{ calibre_puid | default('1000') }}
    -e PGID={{ calibre_pgid | default('1000') }}
    -v /srv/calibre-web-automated/config:/config
    -v /srv/calibre-web-automated/library:/calibre-library
    -v /srv/calibre-web-automated/ingest:/cwa-book-ingest
    docker.io/crocodilestick/calibre-web-automated:latest
  when: calibre_exists.rc != 0
  become: true
