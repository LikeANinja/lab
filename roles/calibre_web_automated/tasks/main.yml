---
- name: Ensure Calibre-Web-Automated directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /srv/calibre-web-automated
    - /srv/calibre-web-automated/config
    - /srv/calibre-web-automated/ingest
    - /srv/calibre-web-automated/library
  become: true

- name: Pull Calibre-Web-Automated image
  command: "{{ podman_bin | default('/usr/bin/podman') }} pull crocodilestick/calibre-web-automated:latest"
  changed_when: false
  become: true

- name: Remove old Calibre-Web-Automated container if present
  command: "{{ podman_bin | default('/usr/bin/podman') }} rm -f calibre-web-automated"
  failed_when: false
  changed_when: false
  become: true

- name: Run Calibre-Web-Automated
  command: >
    {{ podman_bin | default('/usr/bin/podman') }} run -d
    --name calibre-web-automated
    --restart=always
    -p 8083:8083
    -e TZ={{ timezone | default('Europe/London') }}
    -e PUID={{ calibre_puid | default('1000') }}
    -e PGID={{ calibre_pgid | default('1000') }}
    -v /srv/calibre-web-automated/config:/config
    -v /srv/calibre-web-automated/library:/calibre-library
    -v /srv/calibre-web-automated/ingest:/cwa-book-ingest
    crocodilestick/calibre-web-automated:latest
  register: cwa_run
  failed_when: cwa_run.rc != 0 and ("name is already in use" not in cwa_run.stderr)
  changed_when: cwa_run.rc == 0
  become: true
